<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Literature Summary Archive</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <h1>Literature Summary Archive</h1>
        <p>ChatGPT 12-section markdown to structured literature records</p>
      </div>
    </header>

    <main class="app-shell">
      <section class="paste-workflow" aria-label="ChatGPT markdown import">
        <div class="section-heading compact-heading">
          <h2>Paste ChatGPT 12-section Markdown</h2>
          <span id="main-markdown-count" class="count">Parsed 0/13 sections</span>
        </div>
        <textarea id="main-chatgpt-markdown" rows="14" placeholder="Paste the full ChatGPT 0–12 literature summary here."></textarea>
        <div class="button-row paste-actions">
          <button type="button" id="main-parse-markdown">Parse Markdown</button>
          <button type="button" id="clear-main-markdown">Clear Paste Box</button>
          <button type="button" id="main-import-markdown">Import Parsed Record</button>
        </div>
        <p id="main-markdown-status" class="status-message" role="status"></p>
        <div id="main-markdown-preview" class="markdown-preview compact-preview" aria-live="polite"></div>
      </section>

      <section class="toolbar secondary-toolbar" aria-label="Search and secondary DOI tools">
        <div class="field-group search-group">
          <label for="search-input">Search</label>
          <input id="search-input" type="search" placeholder="Search saved papers">
        </div>

        <div class="field-group doi-group secondary-doi">
          <label for="doi-input">Optional DOI metadata import</label>
          <div class="inline-control">
            <input id="doi-input" type="text" placeholder="10.1038/s41586-020-2649-2">
            <button type="button" id="import-doi">Import DOI</button>
          </div>
        </div>
      </section>

      <div class="content-grid">
        <aside class="paper-list-panel" aria-label="Saved papers">
          <div class="section-heading">
            <h2>Saved Papers</h2>
            <span id="paper-count" class="count">0 papers</span>
          </div>
          <p id="empty-list" class="empty-state" hidden>No matching papers.</p>
          <ul id="paper-list" class="paper-list"></ul>
        </aside>

        <section class="editor-panel" aria-label="Paper detail editor">
          <div class="section-heading">
            <h2>Paper Details</h2>
            <div class="button-row">
              <button type="button" id="new-paper">New paper</button>
              <button type="button" id="save-paper">Save</button>
              <button type="button" id="delete-paper">Delete</button>
              <button type="button" id="copy-chatgpt-prompt">Copy ChatGPT Prompt</button>
              <button type="button" id="export-json">Export JSON</button>
              <button type="button" id="import-json">Import JSON</button>
              <input id="import-file" type="file" accept="application/json,.json" hidden>
            </div>
          </div>

          <form id="paper-form" class="paper-form">
            <div class="form-row">
              <label>
                ID
                <input id="paper-id" type="text">
              </label>

              <label>
                Created At
                <input id="createdAt" name="createdAt" type="text">
              </label>
            </div>

            <label>
              Updated At
              <input id="updatedAt" name="updatedAt" type="text">
            </label>

            <label>
              Custom Title
              <input id="customTitle" name="customTitle" type="text">
            </label>

            <div class="form-row">
              <label>
                Reference Nature
                <input id="referenceNature" name="referenceNature" type="text">
              </label>

              <label>
                Nickname
                <input id="nickname" name="nickname" type="text">
              </label>
            </div>

            <label>
              Tags
              <input id="tags" name="tags" type="text" placeholder="comma, separated, tags">
            </label>

            <label>
              Original Title
              <input id="paper-title" type="text">
            </label>

            <label>
              Journal Info
              <input id="journalInfo" name="journalInfo" type="text">
            </label>

            <label>
              DOI
              <input id="paper-doi" type="text">
            </label>

            <label>
              Original Abstract
              <textarea id="abstractOriginal" name="abstractOriginal" rows="5"></textarea>
            </label>

            <label>
              Aim (KO)
              <textarea id="aimKo" name="aimKo" rows="4"></textarea>
            </label>

            <label>
              Result (KO)
              <textarea id="resultKo" name="resultKo" rows="4"></textarea>
            </label>

            <label>
              Method (KO)
              <textarea id="methodKo" name="methodKo" rows="4"></textarea>
            </label>

            <label>
              Note (KO)
              <textarea id="noteKo" name="noteKo" rows="5"></textarea>
            </label>

            <label>
              Impact Factor
              <input id="impactFactor" name="impactFactor" type="text">
            </label>

            <label>
              Summary (KO)
              <textarea id="summaryKo" name="summaryKo" rows="5"></textarea>
            </label>

            <label>
              Abstract (KO)
              <textarea id="abstractKo" name="abstractKo" rows="7"></textarea>
            </label>

            <section class="json-panel" aria-label="ChatGPT JSON import">
              <div class="section-heading compact-heading">
                <h2>ChatGPT JSON Paste Import</h2>
                <button type="button" id="apply-chatgpt-json">Apply JSON to current paper</button>
              </div>
              <textarea id="chatgpt-json" rows="10" placeholder="Paste ChatGPT-generated JSON here"></textarea>
            </section>
          </form>
          <p id="status-message" class="status-message" role="status"></p>
        </section>
      </div>
    </main>

    <div id="markdown-modal" class="modal-backdrop" hidden>
      <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="markdown-modal-title">
        <div class="section-heading compact-heading">
          <h2 id="markdown-modal-title">Paste ChatGPT Markdown</h2>
          <button type="button" id="cancel-markdown-import">Cancel</button>
        </div>

        <label>
          ChatGPT 12-section markdown
          <textarea id="chatgpt-markdown" rows="16" placeholder="Paste the numbered ChatGPT markdown summary here"></textarea>
        </label>

        <div class="button-row modal-actions">
          <button type="button" id="parse-markdown-preview">Parse Preview</button>
          <button type="button" id="import-markdown-current">Import to Current Record</button>
        </div>

        <div id="markdown-preview" class="markdown-preview" aria-live="polite"></div>
      </section>
    </div>

    <script src="app.js"></script>
  </body>
</html>
