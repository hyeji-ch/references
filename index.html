<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Literature DOI Database</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <h1>Literature DOI Database</h1>
        <p>Personal reference notes and DOI records</p>
      </div>
    </header>

    <main class="app-shell">
      <section class="toolbar" aria-label="Import and search tools">
        <div class="field-group doi-group">
          <label for="doi-input">DOI</label>
          <div class="inline-control">
            <input id="doi-input" type="text" placeholder="10.1038/s41586-020-2649-2">
            <button type="button" id="import-doi">Import DOI</button>
          </div>
        </div>

        <div class="field-group search-group">
          <label for="search-input">Search</label>
          <input id="search-input" type="search" placeholder="Search saved papers">
        </div>
      </section>

      <div class="content-grid">
        <aside class="paper-list-panel" aria-label="Saved papers">
          <div class="section-heading">
            <h2>Saved Papers</h2>
            <span id="paper-count" class="count">0 papers</span>
          </div>
          <p id="empty-list" class="empty-state" hidden>No matching papers.</p>
          <ul id="paper-list" class="paper-list"></ul>
        </aside>

        <section class="editor-panel" aria-label="Paper detail editor">
          <div class="section-heading">
            <h2>Paper Details</h2>
            <div class="button-row">
              <button type="button" id="new-paper">New paper</button>
              <button type="button" id="save-paper">Save</button>
              <button type="button" id="delete-paper">Delete</button>
            </div>
          </div>

          <form id="paper-form" class="paper-form">
            <div class="form-row">
              <label>
                ID
                <input id="paper-id" type="text">
              </label>

              <label>
                Created At
                <input id="createdAt" name="createdAt" type="text">
              </label>
            </div>

            <label>
              Updated At
              <input id="updatedAt" name="updatedAt" type="text">
            </label>

            <label>
              Custom Title
              <input id="customTitle" name="customTitle" type="text">
            </label>

            <div class="form-row">
              <label>
                Reference Nature
                <input id="referenceNature" name="referenceNature" type="text">
              </label>

              <label>
                Nickname
                <input id="nickname" name="nickname" type="text">
              </label>
            </div>

            <label>
              Tags
              <input id="tags" name="tags" type="text" placeholder="comma, separated, tags">
            </label>

            <label>
              Original Title
              <input id="paper-title" type="text">
            </label>

            <label>
              Journal Info
              <input id="journalInfo" name="journalInfo" type="text">
            </label>

            <label>
              DOI
              <input id="paper-doi" type="text">
            </label>

            <label>
              Aim (KO)
              <textarea id="aimKo" name="aimKo" rows="4"></textarea>
            </label>

            <label>
              Result (KO)
              <textarea id="resultKo" name="resultKo" rows="4"></textarea>
            </label>

            <label>
              Method (KO)
              <textarea id="methodKo" name="methodKo" rows="4"></textarea>
            </label>

            <label>
              Note (KO)
              <textarea id="noteKo" name="noteKo" rows="5"></textarea>
            </label>

            <label>
              Impact Factor
              <input id="impactFactor" name="impactFactor" type="text">
            </label>

            <label>
              Summary (KO)
              <textarea id="summaryKo" name="summaryKo" rows="5"></textarea>
            </label>

            <label>
              Abstract (KO)
              <textarea id="abstractKo" name="abstractKo" rows="7"></textarea>
            </label>
          </form>
          <p id="status-message" class="status-message" role="status"></p>
        </section>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
